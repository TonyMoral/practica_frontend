<div class="login-container">
    <div class="login-card">
    <h2>Bienvenido</h2>
    <p class="login-subtitle">Introduce tus credenciales para acceder</p>

    <form #loginForm="ngForm" (ngSubmit)="iniciarSesion()">
        <div class="form-group">
        <label for="nickUsuario">Usuario:</label>
        <input type="text" id="nickUsuario" [(ngModel)]="nickUsuario" name="nickUsuario" placeholder="Introduce tu nick" required>
        </div>


        <div class="form-group">
        <label for="contrasena">Contraseña:</label>
        <input type="password" id="contrasena" [(ngModel)]="contrasena" name="contrasena" required>
        </div>


        <div *ngIf="mensajeError" class="error-box">
            {{ mensajeError}}
        </div>
        
        <button type="submit" class="login-button" [disabled]="loginForm.invalid">Iniciar Sesión</button>

    </form>
</div>
</div>
